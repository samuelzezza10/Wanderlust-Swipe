openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TravelBudget API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: trips
    description: Trip suggestions
  - name: saved-trips
    description: Saved/liked trips
  - name: preferences
    description: User preferences and onboarding
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /trips/surprise:
    post:
      operationId: generateSurpriseTrips
      tags: [trips]
      summary: Generate surprise trip suggestions
      description: Generate up to 3 mystery trip suggestions with random destinations within budget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurprisePreferences"
      responses:
        "200":
          description: List of up to 3 surprise trip suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripSuggestion"

  /trips/generate:
    post:
      operationId: generateTrips
      tags: [trips]
      summary: Generate trip suggestions
      description: Generate mock trip suggestions based on user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripPreferences"
      responses:
        "200":
          description: List of generated trip suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripSuggestion"

  /saved-trips:
    get:
      operationId: getSavedTrips
      tags: [saved-trips]
      summary: Get all saved/liked trips for the current user
      responses:
        "200":
          description: List of saved trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedTrip"
    post:
      operationId: saveTrip
      tags: [saved-trips]
      summary: Save a liked trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavedTripInput"
      responses:
        "201":
          description: Trip saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedTrip"

  /saved-trips/{id}:
    get:
      operationId: getSavedTrip
      tags: [saved-trips]
      summary: Get a single saved trip by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved trip detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedTrip"
        "404":
          description: Not found
    delete:
      operationId: deleteSavedTrip
      tags: [saved-trips]
      summary: Remove a saved trip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /preferences:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get user preferences
      responses:
        "200":
          description: User preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
        "404":
          description: No preferences set yet
    put:
      operationId: savePreferences
      tags: [preferences]
      summary: Save or update user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferencesInput"
      responses:
        "200":
          description: Preferences saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

  /trips/stats:
    get:
      operationId: getTripStats
      tags: [trips]
      summary: Get trip statistics for the current user
      responses:
        "200":
          description: Trip stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripStats"

  /usage:
    get:
      operationId: getUsage
      tags: [preferences]
      summary: Get search usage for the current user
      responses:
        "200":
          description: Usage info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SurprisePreferences:
      type: object
      required:
        - budget
        - numberOfPeople
        - departureDate
        - departureLocation
        - numberOfNights
        - tripType
      properties:
        language:
          type: string
        budget:
          type: number
        numberOfPeople:
          type: integer
        hasChildren:
          type: boolean
        numberOfChildren:
          type: ["integer", "null"]
        hasPets:
          type: boolean
        numberOfPets:
          type: ["integer", "null"]
        departureDate:
          type: string
        returnDate:
          type: ["string", "null"]
          description: "Required for round_trip, must be null for one_way"
        tripType:
          type: string
          enum: [one_way, round_trip]
        departureLocation:
          type: string
        numberOfNights:
          type: integer
        flightPreference:
          type: string
          enum: [direct, with_stops, any]
        accommodationType:
          type: ["string", "null"]
          enum: [budget, standard, luxury, null]
        hotelStarsMin:
          type: ["integer", "null"]
        hotelStarsMax:
          type: ["integer", "null"]
        minHotelRating:
          type: ["number", "null"]
        trainPreference:
          type: string
          enum: [direct, with_stops, any]
        hotelAmenities:
          type: array
          items:
            type: string

    TripPreferences:
      type: object
      required:
        - budget
        - numberOfPeople
        - departureDate
        - departureLocation
        - arrivalLocation
        - numberOfNights
        - tripType
      properties:
        language:
          type: string
        budget:
          type: number
        numberOfPeople:
          type: integer
        hasChildren:
          type: boolean
        numberOfChildren:
          type: ["integer", "null"]
        hasPets:
          type: boolean
        numberOfPets:
          type: ["integer", "null"]
        departureDate:
          type: string
        returnDate:
          type: ["string", "null"]
          description: Required only for round_trip; must be null/omitted for one_way
        departureLocation:
          type: string
        arrivalLocation:
          type: string
        hotelDistanceKm:
          type: ["number", "null"]
        maxDistanceFromAirportKm:
          type: ["number", "null"]
        numberOfNights:
          type: integer
        flightPreference:
          type: string
          enum: [direct, with_stops, any]
        accommodationType:
          type: ["string", "null"]
          enum: [budget, standard, luxury, null]
        hotelAmenities:
          type: array
          items:
            type: string
          description: Required hotel amenities (free_cancellation, breakfast, parking, private_bathroom, elevator, pet_friendly, online_payment)
        propertyType:
          type: ["string", "null"]
          enum: [hotel, apartment, any, null]
        minHotelRating:
          type: ["number", "null"]
          description: Minimum hotel rating out of 10
        hotelStarsMin:
          type: ["integer", "null"]
        hotelStarsMax:
          type: ["integer", "null"]
        trainPreference:
          type: string
          enum: [direct, with_stops, any]
        tripType:
          type: string
          enum: [one_way, round_trip]
          description: "one_way = outbound only (no returnDate, no returnTransport); round_trip = outbound + return"

    TripSuggestion:
      type: object
      required:
        - id
        - destination
        - totalPrice
        - transport
        - hotel
        - description
        - imageUrl
        - durationDays
      properties:
        id:
          type: string
        destination:
          type: string
        country:
          type: string
        totalPrice:
          type: number
        pricePerPerson:
          type: number
        transport:
          $ref: "#/components/schemas/TransportOption"
        hotel:
          $ref: "#/components/schemas/HotelOption"
        description:
          type: string
        highlights:
          type: array
          items:
            type: string
        imageUrl:
          type: string
        durationDays:
          type: integer
        transportToHotelKm:
          type: number
        hotelTotalCost:
          type: number
        returnTransport:
          $ref: "#/components/schemas/TransportOption"
        tags:
          type: array
          items:
            type: string
        tripType:
          type: string
          enum: [one_way, round_trip]

    TransportOption:
      type: object
      required:
        - type
        - company
        - duration
        - price
        - isDirect
      properties:
        type:
          type: string
          enum: [flight, train]
        company:
          type: string
        duration:
          type: string
        price:
          type: number
        isDirect:
          type: boolean
        departureTime:
          type: string
        arrivalTime:
          type: string

    HotelOption:
      type: object
      required:
        - name
        - stars
        - pricePerNight
        - distanceFromCenter
        - amenities
      properties:
        name:
          type: string
        stars:
          type: integer
        pricePerNight:
          type: number
        distanceFromCenter:
          type: number
        amenities:
          type: array
          items:
            type: string
        rating:
          type: number
        imageUrl:
          type: ["string", "null"]

    SavedTripInput:
      type: object
      required:
        - tripData
        - destination
        - totalPrice
        - imageUrl
      properties:
        tripData:
          $ref: "#/components/schemas/TripSuggestion"
        destination:
          type: string
        totalPrice:
          type: number
        imageUrl:
          type: string
        shareToken:
          type: ["string", "null"]

    SavedTrip:
      type: object
      required:
        - id
        - destination
        - totalPrice
        - imageUrl
        - createdAt
        - tripData
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        destination:
          type: string
        totalPrice:
          type: number
        imageUrl:
          type: string
        shareToken:
          type: string
        createdAt:
          type: string
        tripData:
          $ref: "#/components/schemas/TripSuggestion"

    UserPreferencesInput:
      type: object
      properties:
        language:
          type: string
        defaultBudget:
          type: ["number", "null"]
        defaultNumberOfPeople:
          type: ["integer", "null"]
        defaultDepartureLocation:
          type: ["string", "null"]
        defaultFlightPreference:
          type: ["string", "null"]
        cookieConsent:
          type: boolean
        onboardingCompleted:
          type: boolean

    UserPreferences:
      type: object
      required:
        - id
        - clerkUserId
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        language:
          type: string
        defaultBudget:
          type: ["number", "null"]
        defaultNumberOfPeople:
          type: ["integer", "null"]
        defaultDepartureLocation:
          type: ["string", "null"]
        defaultFlightPreference:
          type: ["string", "null"]
        cookieConsent:
          type: boolean
        onboardingCompleted:
          type: boolean
        createdAt:
          type: string

    TripStats:
      type: object
      required:
        - totalSaved
        - totalSpent
        - topDestinations
        - averagePrice
      properties:
        totalSaved:
          type: integer
        totalSpent:
          type: number
        topDestinations:
          type: array
          items:
            type: string
        averagePrice:
          type: number
        mostRecentTrip:
          type: ["string", "null"]

    UsageStats:
      type: object
      required:
        - searchCount
        - isPremium
        - freeLimit
      properties:
        searchCount:
          type: integer
        isPremium:
          type: boolean
        freeLimit:
          type: integer
