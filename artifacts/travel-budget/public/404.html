<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wanderlust Swipe</title>
  <script>
    // SPA routing fix for GitHub Pages.
    // When GitHub Pages serves this 404 for a client-side route, we encode
    // the intended path into the query string and redirect to index.html.
    // pathSegmentsToKeep = 1 keeps the repository-name segment
    // (e.g. /Wanderlust-Swipe) so the base path is preserved.
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
