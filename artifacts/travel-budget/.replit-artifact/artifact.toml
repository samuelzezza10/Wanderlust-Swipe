kind = "web"
previewPath = "/"
title = "TravelBudget"
version = "1.0.0"
id = "artifacts/travel-budget"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3001

[services.development]
run = "pnpm --filter @workspace/travel-budget run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/travel-budget", "run", "build" ]
publicDir = "artifacts/travel-budget/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3001"
BASE_PATH = "/"
